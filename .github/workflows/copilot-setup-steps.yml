name: "Copilot Setup Steps"

# Ejecutar automáticamente al modificar este fichero y permitir pruebas manuales
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # El job DEBE llamarse `copilot-setup-steps` para que Copilot lo detecte.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python 3.11
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Install fitness_tools package
              run: pip install -e .
