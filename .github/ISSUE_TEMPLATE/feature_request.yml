name: Feature Request 💡
description: Propón una nueva funcionalidad o mejora
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ¡Gracias por tu idea! Cuéntanos qué te gustaría ver en el proyecto. 🚀

  - type: textarea
    id: problem
    attributes:
      label: ¿Qué problema resuelve esta funcionalidad?
      description: Describe el contexto o el problema que te motiva a proponer este cambio.
      placeholder: "Actualmente no es posible calcular el metabolismo basal con la fórmula Harris-Benedict..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solución propuesta
      description: Describe la funcionalidad que te gustaría que se añadiese.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
      description: ¿Has pensado en otras formas de resolver el problema?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Área del proyecto
      options:
        - CLI (main.py)
        - Web app (app.py / Flask)
        - Librería Python (fitness_tools)
        - Documentación
        - CI / DevOps
        - Otro
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Contexto adicional
      description: Cualquier información extra, referencias, capturas de pantalla, etc.
    validations:
      required: false
